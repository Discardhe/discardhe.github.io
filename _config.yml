title: "Yi He"
description: "日常记录 · CV · 胶卷 · 照片日记 · 王者荣耀"
url: "https://discardhe.github.io"
baseurl: ""

timezone: Asia/Shanghai
markdown: kramdown
permalink: /:categories/:title/

# 站内栏目（可按需增删）
collections:
  film:
    output: true
    permalink: /film/:name/
  diary:
    output: true
    permalink: /diary/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: "page"
  - scope:
      path: ""
      type: "film"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "diary"
    values:
      layout: "page"

# 仅用于导航渲染
nav:
  - title: "CV"
    url: "/cv/"
  - title: "胶卷"
    url: "/film/"
  - title: "Diary"
    url: "/diary/"
  - title: "王者荣耀"
    url: "/honor/"
