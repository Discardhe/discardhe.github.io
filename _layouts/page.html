---
layout: default
---

<section class="page">
  {% if page.title %}
    <header class="page__header glass">
      <h1 class="page__title">{{ page.title }}</h1>
      {% if page.subtitle %}<p class="page__subtitle">{{ page.subtitle }}</p>{% endif %}
    </header>
  {% endif %}

  <article class="page__content glass">
    {{ content }}
  </article>
</section>
